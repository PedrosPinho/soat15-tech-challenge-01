apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-api
  namespace: oficina
  labels:
    app: oficina-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oficina-api
  template:
    metadata:
      labels:
        app: oficina-api
    spec:
      automountServiceAccountToken: false
      containers:
        - name: oficina-api
          # Construída localmente e carregada no kind (ver k8s/README.md), ou publicada
          # no GHCR pelo pipeline de CI/CD (Etapa 5) e referenciada por tag/digest.
          image: oficina-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: oficina-api-config
            - secretRef:
                name: oficina-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            # TCP em vez de /health de propósito: /health reflete o status do MongoDB
            # (retorna 503 se desconectado) e reiniciar o pod não resolve um problema
            # de banco — isso é papel da readinessProbe, que apenas tira o pod do
            # Service até a conexão voltar.
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
