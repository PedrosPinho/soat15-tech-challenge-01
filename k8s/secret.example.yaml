# Template do Secret usado pela API e pelo MongoDB no namespace `oficina`.
#
# NÃO aplique este arquivo diretamente em um cluster real. Ele existe apenas para
# documentar as chaves esperadas. Para criar o Secret de verdade, prefira o comando
# imperativo (não deixa valores em texto plano em nenhum arquivo do repo):
#
#   kubectl create namespace oficina --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic oficina-api-secret -n oficina \
#     --from-literal=MONGODB_URI="mongodb://admin:SENHA_REAL@mongodb:27017/oficina?authSource=admin" \
#     --from-literal=MONGO_ROOT_USERNAME=admin \
#     --from-literal=MONGO_ROOT_PASSWORD=SENHA_REAL \
#     --from-literal=JWT_SECRET=SEGREDO_REAL \
#     --from-literal=WEBHOOK_SECRET=SEGREDO_REAL \
#     --from-literal=SMTP_USER="" \
#     --from-literal=SMTP_PASS=""
#
# Se preferir aplicar via YAML, copie este arquivo para `k8s/secret.yaml` (já está no
# .gitignore, então não será commitado), substitua os valores CHANGE_ME e rode
# `kubectl apply -f k8s/secret.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: oficina-api-secret
  namespace: oficina
type: Opaque
stringData:
  MONGODB_URI: "mongodb://admin:CHANGE_ME@mongodb:27017/oficina?authSource=admin"
  MONGO_ROOT_USERNAME: "admin"
  MONGO_ROOT_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
  WEBHOOK_SECRET: "CHANGE_ME"
  SMTP_USER: ""
  SMTP_PASS: ""
